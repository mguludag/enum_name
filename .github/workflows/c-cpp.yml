name: C/C++ CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  windows-build:
    runs-on: windows-latest

    strategy:
      matrix:
        cpp_standard: [11, 17, 20, 23]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up MSVC and build
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_CXX_STANDARD=${{ matrix.cpp_standard }} -DENUM_NAME_BUILD_TESTS=ON ..
          cmake --build . --config Release
          ctest -j2 --output-on-failure -C Release

  build_linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        config:
          - { compiler: gcc, version: 9, build_type: Release, cppstd: 11 }
          - { compiler: gcc, version: 9, build_type: Release, cppstd: 14 }
          - { compiler: gcc, version: 9, build_type: Release, cppstd: 17 }
          - { compiler: gcc, version: 10, build_type: Debug, cppstd: 20 }
          - { compiler: gcc, version: 12, build_type: Release, cppstd: 20 }
          - { compiler: gcc, version: 13, build_type: Release, cppstd: 20 }
          - { compiler: gcc, version: 14, build_type: Release, cppstd: 23 }
          - { compiler: clang, version: 11, build_type: Release, cppstd: 11 }
          - { compiler: clang, version: 11, build_type: Release, cppstd: 14 }
          - { compiler: clang, version: 11, build_type: Release, cppstd: 17 }
          - {
              compiler: clang,
              version: 11,
              build_type: Debug,
              cppstd: 17,
              asan: OFF,
            }
          - {
              compiler: clang,
              version: 15,
              build_type: Debug,
              cppstd: 20,
              asan: OFF,
            }
          - {
              compiler: clang,
              version: 20,
              build_type: Release,
              cppstd: 23,
              asan: OFF,
            }
    container:
      image: ${{ matrix.config.compiler == 'clang' && 'teeks99/clang-ubuntu' || matrix.config.compiler }}:${{ matrix.config.version }}
    name: "${{ matrix.config.compiler}} ${{ matrix.config.version }} (C++${{ matrix.config.cppstd }}, ${{ matrix.config.build_type }})"
    steps:
      - name: Update packages
        run: apt-get update && apt-get install -y curl git pkg-config libsystemd-dev
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install CMake
        run: |
          CMAKE_VERSION="3.24.2"
          curl -sSL https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.sh -o install-cmake.sh
          chmod +x install-cmake.sh
          ./install-cmake.sh --prefix=/usr/local --skip-license
      - name: Setup Compiler
        if: matrix.config.compiler == 'clang'
        run: |
          if [[ "${{ matrix.config.version }}" -ge 4 ]]; then
            scripts/ci_setup_clang.sh "${{ matrix.config.version }}"
            echo "CXXFLAGS=-stdlib=libc++" >> $GITHUB_ENV
          fi
          echo "CC=clang-${{ matrix.config.version }}" >> $GITHUB_ENV
          echo "CXX=clang++-${{ matrix.config.version }}" >> $GITHUB_ENV
      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} \
            -DENUM_NAME_BUILD_TESTS=ON \
            -DCMAKE_CXX_STANDARD=${{ matrix.config.cppstd }}
          make -j2
          ctest -j2 --output-on-failure

  check-single-include:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build project devcontainer image
        run: |
          docker build -f .devcontainer/Dockerfile -t enum_name_devcontainer:ci .devcontainer
      - name: Run single-include check inside project devcontainer
        run: |
          docker run --rm -v "${{ github.workspace }}":/workspace -w /workspace enum_name_devcontainer:ci bash -lc "
            set -euo pipefail
            if command -v clang-format >/dev/null 2>&1; then
              clang-format --version
            else
              apt-get update && apt-get install -y clang-format
              clang-format --version
            fi
            python3 scripts/amalgamate.py \
              --main include/mgutility/reflection/enum_name.hpp \
              --source-dir include \
              --source-dir mgutility/include \
              --output /tmp/expected_enum_name.hpp
            if ! diff -q single_include/mgutility_enum_name.hpp /tmp/expected_enum_name.hpp > /dev/null 2>&1; then
              echo "ERROR: single_include/mgutility_enum_name.hpp is out of date!"
              echo "Run the following command locally to regenerate:"
              echo "  python3 scripts/amalgamate.py \"
              echo "    --main include/mgutility/reflection/enum_name.hpp \"
              echo "    --source-dir include \"
              echo "    --source-dir mgutility/include \"
              echo "    --output single_include/mgutility_enum_name.hpp"
              diff -u single_include/mgutility_enum_name.hpp /tmp/expected_enum_name.hpp || true
              exit 1
            fi
            echo "single_include/mgutility_enum_name.hpp is up-to-date."
          "
